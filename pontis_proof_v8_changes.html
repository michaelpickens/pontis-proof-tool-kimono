<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontis Proof Tool — Kimono</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f0ec; color: #1a1a1a; min-height: 100vh; }
header { background: #1a1a1a; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
header h1 { color: #fff; font-size: 14px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
.badge { color: #666; font-size: 11px; }
.layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; align-items: start; }
.canvas-wrap { background: #fff; border-radius: 10px; border: 1px solid #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
canvas { display: block; width: 100%; height: auto; }
.panel { display: flex; flex-direction: column; gap: 12px; }
.card { background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 14px 16px; }
.ct { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
input[type="text"] { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; outline: none; }
input[type="text"]:focus { border-color: #1a1a1a; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.fg { margin-bottom: 10px; }
.fg:last-child { margin-bottom: 0; }
.cpw { display: flex; align-items: center; gap: 8px; border: 1px solid #ddd; border-radius: 7px; padding: 5px 9px; cursor: pointer; }
.csw { width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }
.chx { font-size: 11px; font-family: monospace; color: #666; }
input[type="color"] { position: absolute; opacity: 0; width: 0; height: 0; }
.sel { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; background: #fff; outline: none; cursor: pointer; }
.ubtn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 12px; border: 1.5px dashed #ccc; border-radius: 7px; background: #fafaf8; cursor: pointer; font-size: 13px; color: #777; transition: all 0.12s; }
.ubtn:hover { border-color: #888; color: #333; background: #fff; }
.ubtn.has { border-style: solid; border-color: #1a1a1a; color: #1a1a1a; }
.zones { display: flex; flex-direction: column; gap: 7px; }
.zrow { display: flex; align-items: center; gap: 9px; }
.zdot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.zdot.p { background: #f59e0b; }
.zlabel { flex: 1; font-size: 12px; color: #333; }
.ztog { width: 34px; height: 19px; border-radius: 10px; background: #ddd; position: relative; cursor: pointer; border: none; transition: background 0.12s; flex-shrink: 0; }
.ztog.on { background: #1a1a1a; }
.ztog::after { content: ""; position: absolute; width: 15px; height: 15px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left 0.12s; }
.ztog.on::after { left: 17px; }
.tag-previews { display: flex; flex-direction: column; gap: 12px; }
.tag-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.tag-canvas-wrap { border-radius: 6px; overflow: hidden; border: 1px solid #e8e4de; background: #fafaf8; padding: 10px; display: flex; justify-content: center; }
.tag-canvas-wrap canvas { display: block; max-width: 100%; height: auto; }
.expbtn { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.12s; }
.expbtn:hover { background: #333; }
.slabel { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; margin: 10px 0 6px; }
.slabel:first-child { margin-top: 0; }
</style>
</head>
<body>
<header>
  <h1>Pontis Proof Tool</h1>
  <span class="badge">Kimono v1.8</span>
</header>
<div class="layout">
  <div class="canvas-wrap">
    <canvas id="proof" width="1020" height="1320"></canvas>
  </div>
  <div class="panel">

    <div class="card">
      <div class="ct">Academy</div>
      <div class="fg">
        <label>Academy name</label>
        <input type="text" id="aname" value="Your Academy Name" placeholder="Your Academy Name" oninput="render()">
      </div>
      <div class="row2">
        <div class="fg">
          <label>Primary color</label>
          <div class="cpw" onclick="document.getElementById('c1').click()">
            <div class="csw" id="c1sw" style="background:#000000"></div>
            <span class="chx" id="c1hx">#000000</span>
          </div>
          <input type="color" id="c1" value="#000000" oninput="sc('c1')">
        </div>
        <div class="fg">
          <label>Secondary color</label>
          <div class="cpw" onclick="document.getElementById('c2').click()">
            <div class="csw" id="c2sw" style="background:#ffffff"></div>
            <span class="chx" id="c2hx">#ffffff</span>
          </div>
          <input type="color" id="c2" value="#ffffff" oninput="sc('c2')">
        </div>
      </div>
      <div class="fg">
        <label>Academy logo</label>
        <div class="ubtn" id="ubl" onclick="document.getElementById('li').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
          <span id="ult">Upload logo (PNG)</span>
        </div>
        <input type="file" id="li" accept="image/*" style="display:none" onchange="loadLogo(event)">
      </div>
    </div>
<div class="card">
  <div class="ct">Kimono Color</div>
  <select class="sel" id="kcolor" onchange="changeTemplate()">
    <option value="white" selected>White</option>
    <option value="blue">Blue</option>
    <option value="black">Black</option>
  </select>
</div>

  <div class="card">
      <div class="ct">Pontis Logo Color</div>
      <select class="sel" id="pcolor" onchange="render()">
        <option value="#F5F5F5">White</option>
        <option value="#111111" selected>Black</option>
        <option value="#B08D2F">Gold</option>
        <option value="#A61E22">Red</option>
        <option value="#003DA5">Royal Blue</option>
      </select>
    </div>

    <div class="card">
      <div class="ct">Placement Zones</div>
      <div class="slabel">Pontis logos</div>
      <div class="zones" id="pzones"></div>
      <div class="slabel">Academy logo</div>
      <div class="zones" id="azones"></div>
    </div>

    <div class="card">
      <div class="ct">Tag Previews</div>
      <div class="tag-previews">
        <div>
          <div class="tag-label">Neck Tag — Woven Label</div>
          <div class="tag-canvas-wrap">
            <canvas id="neck-tag" width="360" height="260"></canvas>
          </div>
        </div>
        <div>
          <div class="tag-label">Lapel Patch</div>
          <div class="tag-canvas-wrap">
            <canvas id="lapel-patch" width="360" height="110"></canvas>
          </div>
        </div>
      </div>
    </div>

    <button class="expbtn" onclick="exportProof()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Proof PNG
    </button>
  </div>
</div>

}
function drawLogoTinted(ctx, img, color, x, y, w, h, scale, circleBg) {
  if (!img) return;
  const oc = document.createElement("canvas");
  oc.width = img.width; oc.height = img.height;
  const ot = oc.getContext("2d");

  if (circleBg) {
    // Draw white circle background onto offscreen canvas first
    const fit = Math.min(w / img.width, h / img.height) * scale;
    const dw = img.width * fit;
    const dh = img.height * fit;
    const cx = img.width / 2;
    const cy = img.height / 2;
    const cr = Math.min(dw, dh) * 0.5;
    ot.fillStyle = "#fff";
    ot.beginPath();
    ot.arc(cx, cy, cr, 0, Math.PI * 2);
    ot.fill();
  }

  // Tint: fill with color, mask to logo shape
  ot.fillStyle = color;
  ot.fillRect(0, 0, oc.width, oc.height);
  ot.globalCompositeOperation = "destination-in";
  ot.drawImage(img, 0, 0);

  // Draw tinted result into main canvas
  const fit = Math.min(w / img.width, h / img.height) * scale;
  const dw = img.width * fit;
  const dh = img.height * fit;
  const dx = x + (w - dw) / 2;
  const dy = y + (h - dh) / 2;
  ctx.drawImage(oc, dx, dy, dw, dh);
}
function loadImage(src) {
  return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
}
function changeTemplate() {
  const kcolor = document.getElementById("kcolor").value;
  const src = kcolor === "blue" ? TEMPLATE_BLUE : kcolor === "black" ? TEMPLATE_BLACK : TEMPLATE;
  loadImage(src).then(img => { templateImg = img; render(); });
}
async function init() {
  templateImg = await loadImage(TEMPLATE);
  await loadPontisLogos();
  buildZones();
  render();
}

function buildZones() {
  document.getElementById("pzones").innerHTML = PONTIS_ZONES.map(z => `
    <div class="zrow">
      <div class="zdot p"></div>
      <span class="zlabel">${z.label}</span>
      <button class="ztog ${z.on?"on":""}" id="zt-${z.id}" onclick="tog('${z.id}')"></button>
    </div>`).join("");
  document.getElementById("azones").innerHTML = ACAD_ZONES.map(z => `
    <div class="zrow">
      <div class="zdot"></div>
      <span class="zlabel">${z.label}</span>
      <button class="ztog ${z.on?"on":""}" id="zt-${z.id}" onclick="tog('${z.id}')"></button>
    </div>`).join("");
}

function tog(id) {
  const z = [...PONTIS_ZONES, ...ACAD_ZONES].find(z => z.id === id);
  if (!z) return;
  z.on = !z.on;
  document.getElementById("zt-"+id).classList.toggle("on", z.on);
  render();
}

function sc(id) {
  const v = document.getElementById(id).value;
  document.getElementById(id+"sw").style.background = v;
  document.getElementById(id+"hx").textContent = v;
  render();
}

function loadLogo(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { acadLogoImg = img; render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  document.getElementById("ult").textContent = file.name;
  document.getElementById("ubl").classList.add("has");
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Draw a logo image fitted into a box, centered
function drawFit(ctx, img, x, y, w, h, scale) {
  if (!img) return;
  scale = scale || 0.82;
  const ratio = img.width / img.height;
  let lw, lh;
  if (ratio > w / h) { lw = w * scale; lh = lw / ratio; }
  else { lh = h * scale; lw = lh * ratio; }
  ctx.drawImage(img, x + (w - lw) / 2, y + (h - lh) / 2, lw, lh);
}

// Draw placeholder text for missing academy logo
function drawPlaceholder(ctx, x, y, w, h, c1) {
  ctx.fillStyle = c1 + "30";
  rr(ctx, x+4, y+4, w-8, h-8, 3); ctx.fill();
  ctx.fillStyle = c1 + "80";
  ctx.font = `${Math.min(h*0.28, 11)}px sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("academy logo", x + w/2, y + h/2);
}

// ── Neck Tag ─────────────────────────────────────────────────────
function renderNeckTag() {
  const c = document.getElementById("neck-tag");
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const c1 = document.getElementById("c1").value;
  const c2 = document.getElementById("c2").value;
  const pcolor = document.getElementById("pcolor").value;

  ctx.clearRect(0, 0, W, H);

  // Outer border
  const bw = 8;
  ctx.fillStyle = c1;
  rr(ctx, 0, 0, W, H, 11); ctx.fill();

  // White inner
  ctx.fillStyle = "#fff";
  rr(ctx, bw, bw, W - bw*2, H - bw*2, 6); ctx.fill();

  // Logo row (secondary color bg)
  const lrH = 78;  // logo row height - generous
  const lrY = bw;
  ctx.fillStyle = c2;
  ctx.fillRect(bw, lrY, W - bw*2, lrH);

  // Three equal sections for logo row
  const secW = (W - bw*2) / 3;
  const pad = 10;

  // Left: Pontis wordmark
  drawLogoTinted(ctx, pontisWordImg, pcolor, bw + pad, lrY + pad, secW - pad*2, lrH - pad*2, 0.88);

// Center: Pontis icon (white circle, symbol in c1)
  const icx = bw + secW + secW/2;
  const icy = lrY + lrH/2;
  const icr = Math.min(secW - pad*2, lrH - pad*2) * 0.38;
  drawLogoTinted(ctx, pontisIconImg, pcolor, bw + secW + pad, lrY + pad, secW - pad*2, lrH - pad*2, 0.68, true);

  // Right: Academy logo
  if (acadLogoImg) {
    drawFit(ctx, acadLogoImg, bw + secW*2 + pad, lrY + pad, secW - pad*2, lrH - pad*2, 0.88);
  } else {
    ctx.fillStyle = c1;
    ctx.globalAlpha = 0.25;
    ctx.fillRect(bw + secW*2 + pad, lrY + pad, secW - pad*2, lrH - pad*2);
    ctx.globalAlpha = 1;
  }

  // Subtle dividers
  ctx.strokeStyle = c1; ctx.lineWidth = 1; ctx.globalAlpha = 0.2;
  ctx.beginPath();
  ctx.moveTo(bw + secW, lrY + 10); ctx.lineTo(bw + secW, lrY + lrH - 10);
  ctx.moveTo(bw + secW*2, lrY + 10); ctx.lineTo(bw + secW*2, lrY + lrH - 10);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Text rows
  const textY = lrY + lrH;
  const remaining = H - bw*2 - lrH;
  const r1H = Math.round(remaining * 0.36);
  const r2H = Math.round(remaining * 0.34);
  const r3H = remaining - r1H - r2H;

  // Row 1: PRIVATE LABEL PROGRAM — primary color bg
  ctx.fillStyle = c1;
  ctx.fillRect(bw, textY, W - bw*2, r1H);
  ctx.fillStyle = "#fff";
  ctx.font = `bold ${r1H * 0.38}px -apple-system, sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("PRIVATE LABEL PROGRAM", W/2, textY + r1H/2);

  // Row 2: tagline — white bg, auto-fit font size
  const tagline = "BRIDGING JIU JITSU WITH ART AND EXPERIENCE";
  ctx.fillStyle = "#fff";
  ctx.fillRect(bw, textY + r1H, W - bw*2, r2H);
  ctx.fillStyle = c1;
  let fontSize = r2H * 0.3;
  ctx.font = `${fontSize}px -apple-system, sans-serif`;
  while (ctx.measureText(tagline).width > W - bw*2 - 10 && fontSize > 6) {
    fontSize -= 0.5;
    ctx.font = `${fontSize}px -apple-system, sans-serif`;
  }
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(tagline, W/2, textY + r1H + r2H/2);

  // Row 3: URL — secondary color bg, rounded bottom
  ctx.fillStyle = c2;
  rr(ctx, bw, textY + r1H + r2H, W - bw*2, r3H, 6); ctx.fill();
  ctx.fillStyle = c1;
  ctx.font = `bold ${r3H * 0.36}px -apple-system, sans-serif`;
  ctx.fillText("WWW.PONTIS.CO", W/2, textY + r1H + r2H + r3H/2);
}

// ── Lapel Patch ──────────────────────────────────────────────────
function renderLapelPatch() {
  const c = document.getElementById("lapel-patch");
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const c1 = document.getElementById("c1").value;
  const c2 = document.getElementById("c2").value;
  const pcolor = document.getElementById("pcolor").value;

  ctx.clearRect(0, 0, W, H);

  // Outer border
  const bw = 7;
  ctx.fillStyle = c1;
  rr(ctx, 0, 0, W, H, 10); ctx.fill();

  // Inner secondary color band (thin inner border feel)
  ctx.fillStyle = c2;
  rr(ctx, bw, bw, W - bw*2, H - bw*2, 6); ctx.fill();

  // White content area
  const pad = bw + 5;
  ctx.fillStyle = "#fff";
  rr(ctx, pad, pad, W - pad*2, H - pad*2, 4); ctx.fill();

  // Three sections: wordmark | icon | academy logo
  const innerX = pad + 8;
  const innerY = pad + 6;
  const innerW = W - (pad + 8) * 2;
  const innerH = H - (pad + 6) * 2;
  const secW = innerW / 3;

  // Left: Pontis wordmark
drawLogoTinted(ctx, pontisWordImg, pcolor, innerX, innerY, secW, innerH, 0.82);

// Center: Pontis icon (white circle, symbol in c1)
  const icx = innerX + secW + secW/2;
  const icy = innerY + innerH/2;
  const icr = Math.min(secW, innerH) * 0.34;
 drawLogoTinted(ctx, pontisIconImg, pcolor, innerX + secW, innerY, secW, innerH, 0.62, true);

  

  // Right: Academy logo
  if (acadLogoImg) {
    drawFit(ctx, acadLogoImg, innerX + secW*2, innerY, secW, innerH, 0.82);
  } else {
    drawPlaceholder(ctx, innerX + secW*2, innerY, secW, innerH, c1);
  }
}

function render() {
  renderNeckTag();
  renderLapelPatch();

  const canvas = document.getElementById("proof");
  const ctx = canvas.getContext("2d");

  canvas.width = 1020;
  canvas.height = 1320;
  const W = canvas.width;
  const H = canvas.height;
  const KIMONO_W = 1020;
  const KIMONO_H = 1320;

  ctx.clearRect(0, 0, W, H);
  if (!templateImg) return;
 const kcolor = document.getElementById("kcolor").value;
const templateOffsetY = 60;
ctx.fillStyle = "#111111";
ctx.fillRect(0, 0, KIMONO_W, templateOffsetY);
ctx.drawImage(templateImg, 0, templateOffsetY, KIMONO_W, KIMONO_H - templateOffsetY);

  // Draw tags overlaid in the gap below the header
  const TAG_Y = 270;
  const TAG_MARGIN = 30;
  const TAG_SCALE = 0.42;
  const neckW = Math.round(360 * TAG_SCALE);
  const neckH = Math.round(260 * TAG_SCALE);
  const lapelW = Math.round(360 * TAG_SCALE);
  const lapelH = Math.round(110 * TAG_SCALE);
  const LABEL_H = 22;

  // Labels
  ctx.fillStyle = "#333";
  ctx.font = "bold 13px -apple-system, sans-serif";
  ctx.textBaseline = "top";
  ctx.textAlign = "left";
  ctx.fillText("Neck Tag — Woven Label", TAG_MARGIN, TAG_Y);
  ctx.fillText("Lapel Patch", TAG_MARGIN + neckW + TAG_MARGIN, TAG_Y);

  // Neck tag
  const neckCanvas = document.getElementById("neck-tag");
  ctx.drawImage(neckCanvas, TAG_MARGIN, TAG_Y + LABEL_H, neckW, neckH);

  // Lapel patch -- vertically centered against neck tag
  const lapelCanvas = document.getElementById("lapel-patch");
  const lapelX = TAG_MARGIN + neckW + TAG_MARGIN;
  const lapelY = TAG_Y + LABEL_H + (neckH - lapelH) / 2;
  ctx.drawImage(lapelCanvas, lapelX, lapelY, lapelW, lapelH);

  const tagRowH = 0;

  const pcolor = document.getElementById("pcolor").value;

  PONTIS_ZONES.filter(z => z.on).forEach(z => {
    const img = z.type === "word" ? pontisWordImg : pontisIconImg;
    if (!img) return;
    const zx = z.x * KIMONO_W;
    const zy = tagRowH + z.y * KIMONO_H;
    const zw = z.w * KIMONO_W;
    const zh = z.h * KIMONO_H;
    const isIcon = z.type === "icon";
    drawLogoTinted(ctx, img, pcolor, zx, zy, zw, zh, 1.0, isIcon);
  });
// Neck tag on kimono -- collar area front view
  const neckTagCanvas = document.getElementById("neck-tag");
  const ntW = Math.round(KIMONO_W * 0.023);
  const ntH = Math.round(ntW * (260/360));
  const ntX = Math.round(KIMONO_W * 0.304);
  const ntY = Math.round(KIMONO_H * 0.333) + tagRowH;
  ctx.drawImage(neckTagCanvas, ntX, ntY, ntW, ntH);

 // Lapel patch on kimono -- left lapel front view
  const lapelPatchCanvas = document.getElementById("lapel-patch");
  const lpW = Math.round(KIMONO_W * 0.045);
  const lpH = Math.round(lpW * (110/360));
  const lpX = Math.round(KIMONO_W * 0.265);
  const lpY = Math.round(KIMONO_H * 0.520) + tagRowH;
  ctx.save();
  ctx.translate(lpX + lpW / 2, lpY + lpH / 2);
  ctx.rotate(-Math.PI / 2.2);
  ctx.drawImage(lapelPatchCanvas, -lpW / 2, -lpH / 2, lpW, lpH);
  ctx.restore();
ACAD_ZONES.filter(z => z.on).forEach(z => {
    const zx = z.x * KIMONO_W;
    const zy = tagRowH + z.y * KIMONO_H;
    const zw = z.w * KIMONO_W;
    const zh = z.h * KIMONO_H;
    if (acadLogoImg) {
      const ratio = acadLogoImg.width / acadLogoImg.height;
      let lw, lh;
      if (ratio > zw / zh) { lw = zw * 0.85; lh = lw / ratio; }
      else { lh = zh * 0.85; lw = lh * ratio; }
      ctx.save();
      ctx.translate(zx + zw / 2, zy + zh / 2);
      if (z.id === "az_rchest") ctx.rotate(-Math.PI / 2);
      ctx.drawImage(acadLogoImg, -lw / 2, -lh / 2, lw, lh);
      ctx.restore();
    } else {
      ctx.fillStyle = "rgba(34,197,94,0.18)";
      ctx.strokeStyle = "rgba(34,197,94,0.7)";
      ctx.lineWidth = 1.5;
      rr(ctx, zx, zy, zw, zh, 3);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "rgba(34,197,94,0.85)";
      ctx.font = `${Math.min(zh * 0.32, 11)}px sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("logo", zx + zw / 2, zy + zh / 2);
    }
  });
}


function exportProof() {
  const canvas = document.getElementById("proof");
  const name = document.getElementById("aname").value || "academy";
  const a = document.createElement("a");
  a.download = "pontis-proof-"+name.replace(/\s+/g,"-").toLowerCase()+".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}
